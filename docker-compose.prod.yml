version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - saas_network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.production
    ports:
      - '3000:3000'
    networks:
      - saas_network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'
      - '443:443'
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
